<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recoverly — Manav Soni</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo"><img src="logo.jpeg" alt="Manav" class="nav-logo-img"></a>
      <button class="theme-toggle" aria-label="Toggle theme" title="Toggle dark/light mode">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1 class="section-title">Recoverly</h1>
      <p class="project-detail-text">A patient recovery tracking app for hospital discharge patients that helps monitor progress and receive AI feedback. Co-led development from rough concept to working prototype with cross-functional UX and storyboarding.</p>

      <div class="carousel">
        <div class="carousel-track">
          <div class="carousel-slide"><img src="Recoverly Images/Recoverly image 1.png" alt="Recoverly screenshot 1"></div>
          <div class="carousel-slide"><img src="Recoverly Images/Recoverly image 2.png" alt="Recoverly screenshot 2"></div>
          <div class="carousel-slide"><img src="Recoverly Images/Recoverly image 3.png" alt="Recoverly screenshot 3"></div>
          <div class="carousel-slide"><img src="Recoverly Images/Recoverly image 4.png" alt="Recoverly screenshot 4"></div>
          <div class="carousel-slide"><img src="Recoverly Images/Recoverly image 5.png" alt="Recoverly screenshot 5"></div>
          <div class="carousel-slide"><img src="Recoverly Images/Recoverely image 6.png" alt="Recoverly screenshot 6"></div>
          <div class="carousel-slide"><img src="Recoverly Images/Recoverely image 7.png" alt="Recoverly screenshot 7"></div>
        </div>
        <button class="carousel-control prev" aria-label="Previous image">‹</button>
        <button class="carousel-control next" aria-label="Next image">›</button>
        <div class="carousel-dots">
          <button class="carousel-dot active" aria-label="Slide 1"></button>
          <button class="carousel-dot" aria-label="Slide 2"></button>
          <button class="carousel-dot" aria-label="Slide 3"></button>
          <button class="carousel-dot" aria-label="Slide 4"></button>
          <button class="carousel-dot" aria-label="Slide 5"></button>
          <button class="carousel-dot" aria-label="Slide 6"></button>
          <button class="carousel-dot" aria-label="Slide 7"></button>
        </div>
      </div>

      <div class="detail-links">
        <a href="https://github.com/NavCodesBig" target="_blank" rel="noopener" class="btn-primary">View Repository</a>
      </div>
      <div class="tags" style="margin-top:1.5rem;">
        <span class="tag">Full-Stack</span>
      </div>
    </div>
  </main>

  <footer class="project-footer">
    <div class="container">
      <a href="index.html" class="btn-primary">Back Home</a>
    </div>
  </footer>

  <script>
    // === THEME TOGGLE ===
    const themeToggle = document.querySelector('.theme-toggle');
    const html = document.documentElement;

    // Check for saved theme preference or default to light mode
    const currentTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', currentTheme);

    // Theme toggle functionality
    themeToggle.addEventListener('click', () => {
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });

    // === RECOVERLY CAROUSEL ===
    const recoverlyTrack = document.querySelector('.carousel-track');
    const recoverlySlides = document.querySelectorAll('.carousel-slide');
    const recoverlyPrev = document.querySelector('.carousel-control.prev');
    const recoverlyNext = document.querySelector('.carousel-control.next');
    const recoverlyDots = document.querySelectorAll('.carousel-dot');
    let recoverlyIndex = 0;

    const updateRecoverlyCarousel = () => {
      recoverlyTrack.style.transform = `translateX(-${recoverlyIndex * 100}%)`;
      recoverlyDots.forEach((dot, idx) => dot.classList.toggle('active', idx === recoverlyIndex));
    };

    recoverlyPrev.addEventListener('click', () => {
      recoverlyIndex = (recoverlyIndex - 1 + recoverlySlides.length) % recoverlySlides.length;
      updateRecoverlyCarousel();
    });

    recoverlyNext.addEventListener('click', () => {
      recoverlyIndex = (recoverlyIndex + 1) % recoverlySlides.length;
      updateRecoverlyCarousel();
    });

    recoverlyDots.forEach((dot, idx) => {
      dot.addEventListener('click', () => {
        recoverlyIndex = idx;
        updateRecoverlyCarousel();
      });
    });
  </script>
</body>
</html>
